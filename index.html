<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QR Photo Page</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f3f4f6; color: #111; }
    .page { max-width: 720px; margin: 0 auto; padding: 2rem; text-align: center; }
    .card { background: white; border-radius: 16px; padding: 1.5rem; box-shadow: 0 16px 40px rgba(0,0,0,.08); }
    h1 { margin-top: 0; font-size: 2rem; }
    p { font-size: 1.1rem; line-height: 1.6; }
    img { max-width: 100%; height: auto; border-radius: 14px; margin-top: 1rem; }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <h1>Congratulations!</h1>
      <p id="marks-text">You got 2 Marks.</p>
      <img src="dengue.jpeg" alt="Photo" />
    </div>
  </div>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const points = urlParams.get('points');
    const marks = urlParams.get('marks');
    if (points) {
      document.getElementById('marks-text').textContent = `You got ${points} Points.`;
      fetch(`/api/track-scan?points=${points}`).catch(err => console.error('Analytics failed:', err));
    } else if (marks) {
      document.getElementById('marks-text').textContent = `You got ${marks} Marks.`;
      fetch(`/api/track-scan?points=${marks}`).catch(err => console.error('Analytics failed:', err));
    }
  </script>
</body>
</html>
