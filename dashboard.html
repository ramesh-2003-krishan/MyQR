<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Scan Analytics Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0a0b10;
      --bg-card: rgba(18, 20, 30, 0.7);
      --border-card: rgba(255, 255, 255, 0.08);
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --primary: #6366f1;
      --primary-glow: rgba(99, 102, 241, 0.15);
      --pulse-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg-dark);
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(168, 85, 247, 0.05) 0%, transparent 40%);
      color: var(--text-main);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2.5rem;
      border-bottom: 1px solid var(--border-card);
      padding-bottom: 1.5rem;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      background: var(--pulse-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .refresh-btn {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      color: var(--text-main);
      padding: 0.6rem 1.2rem;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 500;
      font-size: 0.875rem;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .refresh-btn:hover {
      background: rgba(255, 255, 255, 0.04);
      border-color: rgba(255, 255, 255, 0.15);
      transform: translateY(-1px);
    }

    .refresh-btn:active {
      transform: translateY(0);
    }

    /* Stats Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2.5rem;
    }

    .card {
      background: var(--bg-card);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-card);
      border-radius: 20px;
      padding: 1.75rem;
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: transparent;
      transition: background 0.3s;
    }

    .card:hover {
      border-color: rgba(99, 102, 241, 0.3);
    }

    .card.primary-card {
      border: 1px solid rgba(99, 102, 241, 0.2);
      box-shadow: 0 10px 30px var(--primary-glow);
    }

    .card.primary-card::before {
      background: var(--pulse-gradient);
    }

    .card-label {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .card-value {
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--text-main);
      line-height: 1;
    }

    .card.primary-card .card-value {
      background: var(--pulse-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Distribution Chart Section */
    .chart-section {
      background: var(--bg-card);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-card);
      border-radius: 24px;
      padding: 2rem;
    }

    .chart-title {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
    }

    .distribution-row {
      margin-bottom: 1.5rem;
    }

    .distribution-info {
      display: flex;
      justify-content: space-between;
      font-size: 0.95rem;
      margin-bottom: 0.5rem;
    }

    .level-label {
      font-weight: 600;
      color: var(--text-main);
    }

    .level-count {
      color: var(--text-muted);
    }

    .progress-bar-bg {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      height: 12px;
      border-radius: 6px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      width: 0%;
      border-radius: 6px;
      transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .fill-2 { background: linear-gradient(90deg, #3b82f6, #06b6d4); }
    .fill-5 { background: linear-gradient(90deg, #6366f1, #a855f7); }
    .fill-10 { background: linear-gradient(90deg, #ec4899, #f43f5e); }

    /* Loading Overlay */
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(10, 11, 16, 0.8);
      backdrop-filter: blur(8px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      transition: opacity 0.3s;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-left-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s infinite linear;
    }

    .error-banner {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #fca5a5;
      padding: 1rem;
      border-radius: 12px;
      margin-bottom: 2rem;
      display: none;
      font-size: 0.95rem;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="loading" class="loading-overlay">
    <div class="spinner"></div>
  </div>

  <div class="container">
    <header>
      <h1>Analytics Dashboard</h1>
      <button class="refresh-btn" onclick="fetchStats()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/></svg>
        Refresh
      </button>
    </header>

    <div id="error" class="error-banner"></div>

    <div class="grid">
      <div class="card primary-card">
        <div class="card-label">Total Scans</div>
        <div id="val-total" class="card-value">0</div>
      </div>
      <div class="card">
        <div class="card-label">2 Points Scans</div>
        <div id="val-2" class="card-value">0</div>
      </div>
      <div class="card">
        <div class="card-label">5 Points Scans</div>
        <div id="val-5" class="card-value">0</div>
      </div>
      <div class="card">
        <div class="card-label">10 Points Scans</div>
        <div id="val-10" class="card-value">0</div>
      </div>
    </div>

    <div class="chart-section">
      <div class="chart-title">Scans Distribution</div>
      
      <div class="distribution-row">
        <div class="distribution-info">
          <span class="level-label">2 Points QR Code</span>
          <span id="label-2" class="level-count">0 scans (0%)</span>
        </div>
        <div class="progress-bar-bg">
          <div id="bar-2" class="progress-bar-fill fill-2"></div>
        </div>
      </div>

      <div class="distribution-row">
        <div class="distribution-info">
          <span class="level-label">5 Points QR Code</span>
          <span id="label-5" class="level-count">0 scans (0%)</span>
        </div>
        <div class="progress-bar-bg">
          <div id="bar-5" class="progress-bar-fill fill-5"></div>
        </div>
      </div>

      <div class="distribution-row">
        <div class="distribution-info">
          <span class="level-label">10 Points QR Code</span>
          <span id="label-10" class="level-count">0 scans (0%)</span>
        </div>
        <div class="progress-bar-bg">
          <div id="bar-10" class="progress-bar-fill fill-10"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    async function fetchStats() {
      const loader = document.getElementById('loading');
      const errBanner = document.getElementById('error');
      
      loader.style.opacity = '1';
      loader.style.display = 'flex';
      errBanner.style.display = 'none';

      try {
        const response = await fetch('/api/stats');
        if (!response.ok) {
          const errData = await response.json();
          throw new Error(errData.error || `HTTP error! status: ${response.status}`);
        }
        
        const data = await response.json();
        
        // Update raw numbers
        document.getElementById('val-total').innerText = data.total;
        document.getElementById('val-2').innerText = data.scan_2;
        document.getElementById('val-5').innerText = data.scan_5;
        document.getElementById('val-10').innerText = data.scan_10;

        // Calculate distributions
        const total = data.total || 0;
        const pct2 = total > 0 ? Math.round((data.scan_2 / total) * 100) : 0;
        const pct5 = total > 0 ? Math.round((data.scan_5 / total) * 100) : 0;
        const pct10 = total > 0 ? Math.round((data.scan_10 / total) * 100) : 0;

        // Update levels count details
        document.getElementById('label-2').innerText = `${data.scan_2} scans (${pct2}%)`;
        document.getElementById('label-5').innerText = `${data.scan_5} scans (${pct5}%)`;
        document.getElementById('label-10').innerText = `${data.scan_10} scans (${pct10}%)`;

        // Update progress bar widths
        document.getElementById('bar-2').style.width = `${pct2}%`;
        document.getElementById('bar-5').style.width = `${pct5}%`;
        document.getElementById('bar-10').style.width = `${pct10}%`;

      } catch (error) {
        console.error('Fetcher stats error:', error);
        errBanner.innerText = `Error: ${error.message}`;
        errBanner.style.display = 'block';
      } finally {
        // Smooth transition out
        setTimeout(() => {
          loader.style.opacity = '0';
          setTimeout(() => {
            loader.style.display = 'none';
          }, 300);
        }, 300);
      }
    }

    // Initial load
    window.addEventListener('DOMContentLoaded', fetchStats);
  </script>
</body>
</html>
